name: Astrenza
options:
  bundleIdPrefix: com.ikuradon
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
packages:
  AstrenzaCore:
    path: Packages/AstrenzaCore
  secp256k1:
    url: https://github.com/jb55/secp256k1.swift
    revision: 40b4b38b3b1c83f7088c76189a742870e0ca06a9
  negentropy-swift:
    url: https://github.com/damus-io/negentropy-swift
    from: 0.1.0
targets:
  Astrenza:
    type: application
    platform: iOS
    sources:
      - path: Astrenza/Sources
    dependencies:
      - package: AstrenzaCore
        product: AstrenzaCore
      - package: secp256k1
        product: secp256k1
      - package: negentropy-swift
        product: Negentropy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikuradon.Astrenza
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Astrenza
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      testTargets:
        - AstrenzaTests
  AstrenzaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Astrenza/Tests/AstrenzaTests
    dependencies:
      - target: Astrenza
      - package: AstrenzaCore
        product: AstrenzaCore
      - package: secp256k1
        product: secp256k1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikuradon.AstrenzaTests
        GENERATE_INFOPLIST_FILE: YES

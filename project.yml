name: Astrenza
options:
  bundleIdPrefix: com.ikuradon
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.1"
packages:
  AstrenzaCore:
    path: Packages/AstrenzaCore
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.11.0
  negentropy-swift:
    url: https://github.com/damus-io/negentropy-swift
    from: 0.1.0
targets:
  Astrenza:
    type: application
    platform: iOS
    sources:
      - path: Astrenza/Sources
    dependencies:
      - package: AstrenzaCore
        product: AstrenzaCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikuradon.Astrenza
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Astrenza
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
  AstrenzaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Astrenza/Tests/AstrenzaTests
    dependencies:
      - target: Astrenza
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikuradon.AstrenzaTests
        GENERATE_INFOPLIST_FILE: YES
  AstrenzaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Astrenza/Tests/AstrenzaUITests
    dependencies:
      - target: Astrenza
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikuradon.AstrenzaUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Astrenza:
    build:
      targets:
        Astrenza: all
        AstrenzaTests: [test]
        AstrenzaUITests: [test]
    test:
      targets:
        - AstrenzaTests
        - AstrenzaUITests
        - package: AstrenzaCore/AstrenzaCoreTests
  AstrenzaPerformance:
    build:
      targets:
        Astrenza: all
        AstrenzaUITests: [test]
    test:
      environmentVariables:
        ASTRENZA_RUN_PERFORMANCE_UI: "1"
      targets:
        - AstrenzaUITests

appId: com.ikuradon.Astrenza
---
- launchApp:
    clearState: true
    arguments:
      AstrenzaMockTimeline: true
- assertVisible:
    id: timeline.feed
- assertVisible:
    text: User Alpha
- swipe:
    start: 50%, 75%
    end: 50%, 56%
    duration: 320
- assertVisible:
    id: timeline.gap.row
- assertVisible:
    text: Missing notes
- tapOn:
    id: timeline.gap.row
- assertVisible:
    text: User Cache
- assertNotVisible:
    text: Missing notes
- swipe:
    start: 50%, 75%
    end: 50%, 60%
    duration: 280
- assertVisible:
    text: User Relay
- swipe:
    start: 50%, 75%
    end: 50%, 55%
    duration: 320
- assertVisible:
    text: User Longform
- swipe:
    start: 50%, 75%
    end: 50%, 55%
    duration: 320
- assertVisible:
    text: Show more

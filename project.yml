name: Astrenza
options:
  bundleIdPrefix: com.ikuradon
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
targets:
  Astrenza:
    type: application
    platform: iOS
    sources:
      - path: Astrenza/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikuradon.Astrenza
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Astrenza
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      testTargets: []
